name: taiwan-100-peaks-dashboard

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taiwan_peaks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taiwan_peaks_password}
      POSTGRES_DB: ${POSTGRES_DB:-taiwan_100_peaks}
      TZ: Asia/Taipei
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-taiwan_peaks}:${POSTGRES_PASSWORD:-taiwan_peaks_password}@db:5432/${POSTGRES_DB:-taiwan_100_peaks}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command:
      [
        "sh",
        "-c",
        "uv run --no-sync alembic upgrade head && uv run --no-sync python scripts/seed_database.py && uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres-data:

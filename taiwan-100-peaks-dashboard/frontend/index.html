<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>臺灣百岳單攻地圖</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <p class="eyebrow">Taiwan 100 Peaks One-Day Hike Dashboard</p>
        <h1>臺灣百岳單攻地圖</h1>
        <p class="intro">
          以靜態 seed data 標示可單攻百岳路線，點擊 Marker 可查看路線長度、海拔與行政區資訊。
        </p>
      </header>

      <section class="map-section" aria-labelledby="map-title">
        <div class="section-heading">
          <h2 id="map-title">山岳路線地圖</h2>
          <p id="map-status">載入臺灣地圖與山岳標記中...</p>
        </div>
        <div id="map" aria-label="臺灣百岳單攻路線地圖"></div>
      </section>

      <section class="info-section" aria-labelledby="info-title">
        <h2 id="info-title">目前範圍</h2>
        <p>
          本頁僅建置前端靜態地圖原型，尚未串接 API、資料庫或儀表板。
        </p>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
